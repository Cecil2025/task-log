<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .preview {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .icon-display {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            background: linear-gradient(135deg, #5B8DEF 0%, #4A7BD9 100%);
        }
        .btn {
            background: linear-gradient(135deg, #5B8DEF, #4A7BD9);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(91, 141, 239, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .instructions {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .instructions h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .instructions p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .step {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .step-num {
            background: #5B8DEF;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .step-text {
            color: #333;
            flex: 1;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .icon-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        .icon-item canvas {
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .icon-item .size {
            font-size: 12px;
            color: #666;
        }
        .icon-item .download {
            display: block;
            margin-top: 5px;
            padding: 5px 10px;
            background: #5B8DEF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 12px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 PWA 图标生成器</h1>
        
        <div class="preview">
            <div class="icon-display" id="iconPreview">📋</div>
            <button class="btn" onclick="generateAllIcons()">🚀 一键生成所有图标</button>
            <div class="success" id="successMsg">
                ✅ 所有图标已生成！请下载它们，然后上传到你的 GitHub 仓库。
            </div>
        </div>

        <div class="instructions">
            <h2>📝 使用说明</h2>
            
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">
                    <strong>点击上方按钮</strong>生成所有需要的图标尺寸
                </div>
            </div>
            
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">
                    <strong>下载所有图标</strong>到你的电脑（会在下方显示下载链接）
                </div>
            </div>
            
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">
                    <strong>上传到 GitHub</strong>：访问 <a href="https://github.com/Cecil2025/task-log" target="_blank">你的仓库</a>，点击 Add file → Upload files，把所有图标文件上传
                </div>
            </div>
            
            <div class="step">
                <div class="step-num">4</div>
                <div class="step-text">
                    <strong>回到 PWABuilder</strong>，刷新页面，所有检查项应该都会通过！然后点击 "Package for stores" 生成 APK
                </div>
            </div>
        </div>

        <div class="icon-grid" id="iconGrid"></div>
    </div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 绘制圆角矩形背景
            const cornerRadius = size * 0.18;
            ctx.beginPath();
            ctx.moveTo(cornerRadius, 0);
            ctx.lineTo(size - cornerRadius, 0);
            ctx.arcTo(size, 0, size, cornerRadius, cornerRadius);
            ctx.lineTo(size, size - cornerRadius);
            ctx.arcTo(size, size, size - cornerRadius, size, cornerRadius);
            ctx.lineTo(cornerRadius, size);
            ctx.arcTo(0, size, 0, size - cornerRadius, cornerRadius);
            ctx.lineTo(0, cornerRadius);
            ctx.arcTo(0, 0, cornerRadius, 0, cornerRadius);
            ctx.closePath();
            
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#5B8DEF');
            gradient.addColorStop(1, '#4A7BD9');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 绘制图标符号
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('📋', size / 2, size / 2);
            
            return canvas;
        }
        
        function generateAllIcons() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            
            sizes.forEach(size => {
                const canvas = createIcon(size);
                const item = document.createElement('div');
                item.className = 'icon-item';
                
                canvas.style.width = '80px';
                canvas.style.height = '80px';
                
                const downloadLink = document.createElement('a');
                downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.download = `icon-${size}.png`;
                downloadLink.className = 'download';
                downloadLink.textContent = '下载';
                
                const sizeLabel = document.createElement('div');
                sizeLabel.className = 'size';
                sizeLabel.textContent = `${size}x${size}`;
                
                item.appendChild(canvas);
                item.appendChild(sizeLabel);
                item.appendChild(downloadLink);
                grid.appendChild(item);
            });
            
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('successMsg').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 页面加载时显示预览
        window.onload = function() {
            const preview = document.getElementById('iconPreview');
            const size = 200;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const cornerRadius = size * 0.2;
            ctx.beginPath();
            ctx.moveTo(cornerRadius, 0);
            ctx.lineTo(size - cornerRadius, 0);
            ctx.arcTo(size, 0, size, cornerRadius, cornerRadius);
            ctx.lineTo(size, size - cornerRadius);
            ctx.arcTo(size, size, size - cornerRadius, size, cornerRadius);
            ctx.lineTo(cornerRadius, size);
            ctx.arcTo(0, size, 0, size - cornerRadius, cornerRadius);
            ctx.lineTo(0, cornerRadius);
            ctx.arcTo(0, 0, cornerRadius, 0, cornerRadius);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#5B8DEF');
            gradient.addColorStop(1, '#4A7BD9');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = '120px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('📋', size / 2, size / 2);
            
            preview.innerHTML = '';
            preview.style.background = 'transparent';
            preview.style.borderRadius = '40px';
            preview.appendChild(canvas);
        };
    </script>
</body>
</html>
