<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5B8DEF">
    <link rel="manifest" href="manifest.json">
    <title>任务日志</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #F5F5F5;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            border-top: 1px solid #E0E0E0;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px 0 8px;
            cursor: pointer;
            color: #999;
            font-size: 11px;
            transition: color 0.2s;
        }
        .nav-item.active { color: #5B8DEF; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #5B8DEF 0%, #4A7BD9 100%);
            color: white;
            padding: 16px 20px;
            padding-top: calc(env(safe-area-inset-top, 12px) + 12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { font-size: 20px; font-weight: bold; }
        .header-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
        }
        .header-sub {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 4px;
        }

        /* ===== 通用 ===== */
        .page { display: none; padding-bottom: 70px; }
        .page.active { display: block; }
        .hidden { display: none !important; }

        .card {
            background: white;
            border-radius: 12px;
            margin: 12px 16px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 15px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-active { background: #E8F5E9; color: #43A047; }
        .badge-paused { background: #FFF3E0; color: #EF6C00; }
        .badge-done { background: #ECEFF1; color: #78909C; }

        .tag-pinned {
            display: inline-block;
            background: #FFF8E1;
            color: #F57F17;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }

        /* ===== 任务列表 ===== */
        .task-card {
            background: white;
            border-radius: 12px;
            margin: 10px 16px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.15s;
            border-left: 4px solid #5B8DEF;
        }
        .task-card:active { transform: scale(0.98); }
        .task-card.status-done { border-left-color: #B0BEC5; opacity: 0.7; }
        .task-card.status-paused { border-left-color: #FF9800; }

        .task-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }
        .task-desc {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
        }
        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #F0F0F0;
        }
        .task-action-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            background: #F5F5F5;
            color: #666;
        }
        .task-action-btn.primary { background: #5B8DEF; color: white; }
        .task-action-btn.danger { background: #FFEBEE; color: #E53935; }

        /* ===== 日志列表 ===== */
        .log-card {
            background: white;
            border-radius: 12px;
            margin: 10px 16px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .log-card.pinned {
            border: 1px solid #FFF8E1;
            background: #FFFDF5;
        }
        .log-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }
        .log-content {
            font-size: 15px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #F0F0F0;
        }
        .log-action-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            background: #F5F5F5;
            color: #666;
        }
        .log-action-btn.pin-active { background: #FFF8E1; color: #F57F17; }
        .log-action-btn.danger { background: #FFEBEE; color: #E53935; }

        /* ===== 表单 ===== */
        .form-page {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #F5F5F5;
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        .form-page.active { display: flex; }
        .form-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: white;
            color: #333;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #5B8DEF;
        }
        .form-textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
        }
        .form-switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
        }
        .form-switch-label { font-size: 15px; color: #555; }
        .switch {
            position: relative;
            width: 48px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 28px;
            transition: 0.3s;
        }
        .slider:before {
            content: "";
            position: absolute;
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch input:checked + .slider { background-color: #5B8DEF; }
        .switch input:checked + .slider:before { transform: translateX(20px); }

        .form-time-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .form-time-input input {
            flex: 1;
        }
        .form-time-input span {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5B8DEF, #4A7BD9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:active { opacity: 0.9; }
        .btn-submit.danger-btn {
            background: linear-gradient(135deg, #E53935, #C62828);
        }

        /* ===== 提醒横幅 ===== */
        .reminder-banner {
            background: linear-gradient(135deg, #FFF8E1, #FFF3E0);
            margin: 12px 16px;
            padding: 14px 16px;
            border-radius: 12px;
            border-left: 4px solid #FF9800;
        }
        .reminder-title {
            font-size: 14px;
            font-weight: 600;
            color: #E65100;
            margin-bottom: 4px;
        }
        .reminder-text {
            font-size: 13px;
            color: #BF360C;
        }
        .reminder-btn {
            margin-top: 8px;
            padding: 6px 16px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* ===== 统计 ===== */
        .stats-row {
            display: flex;
            gap: 10px;
            padding: 0 16px;
            margin-top: 12px;
        }
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-num {
            font-size: 24px;
            font-weight: bold;
            color: #5B8DEF;
        }
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* ===== 筛选 ===== */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #E0E0E0;
            background: white;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #5B8DEF;
            color: white;
            border-color: #5B8DEF;
        }

        /* ===== 搜索 ===== */
        .search-bar {
            margin: 12px 16px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }
        .search-bar input:focus { outline: none; border-color: #5B8DEF; }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 确认弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin: 0 40px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
        .modal-msg { font-size: 14px; color: #666; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }
        .modal-btn.cancel { background: #F5F5F5; color: #666; }
        .modal-btn.confirm { background: #5B8DEF; color: white; }
        .modal-btn.confirm-danger { background: #E53935; color: white; }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">确认</div>
        <div class="modal-msg" id="modal-msg">确定要执行此操作吗？</div>
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn confirm" id="modal-confirm" onclick="confirmModal()">确定</button>
        </div>
    </div>
</div>

<!-- ========== 页面1：任务列表 ========== -->
<div class="page active" id="page-tasks">
    <div class="header">
        <div class="header-row">
            <div class="header-title">任务日志</div>
            <button class="header-btn" onclick="openTaskForm()">+ 新任务</button>
        </div>
        <div class="header-sub" id="task-summary">0 个进行中的任务</div>
    </div>

    <!-- 统计 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-num" id="stat-active">0</div>
            <div class="stat-label">进行中</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-paused">0</div>
            <div class="stat-label">已暂停</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-done">0</div>
            <div class="stat-label">已完成</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-logs">0</div>
            <div class="stat-label">总日志</div>
        </div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索任务..." id="task-search" oninput="renderTasks()">
    </div>

    <!-- 筛选 -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setTaskFilter('all', this)">全部</button>
        <button class="filter-btn" data-filter="active" onclick="setTaskFilter('active', this)">进行中</button>
        <button class="filter-btn" data-filter="paused" onclick="setTaskFilter('paused', this)">已暂停</button>
        <button class="filter-btn" data-filter="done" onclick="setTaskFilter('done', this)">已完成</button>
    </div>

    <div id="task-list"></div>
</div>

<!-- ========== 页面2：日志列表 ========== -->
<div class="page" id="page-logs">
    <div class="header">
        <div class="header-row">
            <button class="header-btn" onclick="switchPage('tasks')">← 返回</button>
            <div class="header-title" id="log-task-name">任务日志</div>
            <button class="header-btn" onclick="openLogForm()">+ 写日志</button>
        </div>
        <div class="header-sub" id="log-summary">0 条日志</div>
    </div>

    <!-- 提醒横幅 -->
    <div class="reminder-banner hidden" id="reminder-banner">
        <div class="reminder-title">⏰ 今日待更新</div>
        <div class="reminder-text" id="reminder-text">这个任务今天还没有写日志哦</div>
        <button class="reminder-btn" onclick="openLogForm()">立即更新</button>
    </div>

    <!-- 筛选 -->
    <div class="filter-bar">
        <button class="filter-btn active" data-logfilter="all" onclick="setLogFilter('all', this)">全部</button>
        <button class="filter-btn" data-logfilter="pinned" onclick="setLogFilter('pinned', this)">📌 置顶</button>
        <button class="filter-btn" data-logfilter="today" onclick="setLogFilter('today', this)">今天</button>
        <button class="filter-btn" data-logfilter="week" onclick="setLogFilter('week', this)">本周</button>
    </div>

    <div id="log-list"></div>
</div>

<!-- ========== 页面3：任务表单 ========== -->
<div class="form-page" id="page-task-form">
    <div class="header">
        <div class="header-row">
            <button class="header-btn" onclick="closeTaskForm()">← 返回</button>
            <div class="header-title" id="task-form-title">新建任务</div>
            <div style="width:50px"></div>
        </div>
    </div>
    <div class="form-body">
        <div class="form-group">
            <label class="form-label">任务名称 *</label>
            <input class="form-input" id="tf-name" placeholder="例如：项目A开发" maxlength="50">
        </div>
        <div class="form-group">
            <label class="form-label">任务描述</label>
            <textarea class="form-textarea" id="tf-desc" placeholder="简要描述这个任务的目标..." style="min-height:100px"></textarea>
        </div>
        <div class="form-group">
            <div class="form-switch-row">
                <span class="form-switch-label">🔔 每日提醒</span>
                <label class="switch">
                    <input type="checkbox" id="tf-reminder" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="form-group" id="tf-time-group">
            <label class="form-label">提醒时间</label>
            <div class="form-time-input">
                <input class="form-input" type="time" id="tf-time" value="20:00">
                <span>每天提醒你更新日志</span>
            </div>
        </div>
        <button class="btn-submit" onclick="saveTask()">保存任务</button>
        <button class="btn-submit danger-btn hidden" id="btn-delete-task" onclick="deleteTask()" style="margin-top:10px">删除任务</button>
    </div>
</div>

<!-- ========== 页面4：日志表单 ========== -->
<div class="form-page" id="page-log-form">
    <div class="header">
        <div class="header-row">
            <button class="header-btn" onclick="closeLogForm()">← 返回</button>
            <div class="header-title" id="log-form-title">写日志</div>
            <div style="width:50px"></div>
        </div>
    </div>
    <div class="form-body">
        <div class="form-group">
            <label class="form-label">日志内容 *</label>
            <textarea class="form-textarea" id="lf-content" placeholder="今天做了什么？遇到了什么问题？下一步计划..."></textarea>
        </div>
        <div class="form-group">
            <div class="form-switch-row">
                <span class="form-switch-label">📌 长期置顶</span>
                <label class="switch">
                    <input type="checkbox" id="lf-pinned">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <button class="btn-submit" onclick="saveLog()">保存日志</button>
        <button class="btn-submit danger-btn hidden" id="btn-delete-log" onclick="deleteLog()" style="margin-top:10px">删除日志</button>
    </div>
</div>

<!-- ========== 底部导航 ========== -->
<div class="bottom-nav">
    <div class="nav-item active" id="nav-tasks" onclick="switchPage('tasks')">
        <div class="nav-icon">📋</div>
        <div>任务</div>
    </div>
    <div class="nav-item" id="nav-logs" onclick="goToLogsFromNav()">
        <div class="nav-icon">📝</div>
        <div>日志</div>
    </div>
</div>

<script>
// ===== 数据层 =====
const KEYS = { tasks: 'tl_tasks', logs: 'tl_logs' };
let tasks = [], logs = [];
let currentTaskId = null, editingTaskId = null, editingLogId = null;
let taskFilter = 'all', logFilter = 'all';
let modalCallback = null;

function load() {
    tasks = JSON.parse(localStorage.getItem(KEYS.tasks) || '[]');
    logs = JSON.parse(localStorage.getItem(KEYS.logs) || '[]');
}
function save() {
    localStorage.setItem(KEYS.tasks, JSON.stringify(tasks));
    localStorage.setItem(KEYS.logs, JSON.stringify(logs));
}

// ===== 工具函数 =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function formatDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateTime(ts) {
    const d = new Date(ts);
    const weekdays = ['日','一','二','三','四','五','六'];
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} 周${weekdays[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function isToday(ts) { return formatDate(ts) === formatDate(Date.now()); }
function isThisWeek(ts) {
    const now = new Date(), d = new Date(ts);
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay()); weekStart.setHours(0,0,0,0);
    return d >= weekStart;
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
function showModal(title, msg, onConfirm, danger) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    const btn = document.getElementById('modal-confirm');
    btn.className = danger ? 'modal-btn confirm-danger' : 'modal-btn confirm';
    modalCallback = onConfirm;
    document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); modalCallback = null; }
function confirmModal() { if (modalCallback) modalCallback(); closeModal(); }

// ===== 页面切换 =====
function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'tasks') renderTasks();
    if (name === 'logs') renderLogs();
}
function goToLogsFromNav() {
    if (currentTaskId) { switchPage('logs'); }
    else { showToast('请先选择一个任务'); }
}

// ===== 任务筛选 =====
function setTaskFilter(f, el) {
    taskFilter = f;
    document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTasks();
}
function setLogFilter(f, el) {
    logFilter = f;
    document.querySelectorAll('[data-logfilter]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderLogs();
}

// ===== 渲染任务列表 =====
function renderTasks() {
    load();
    const search = (document.getElementById('task-search').value || '').toLowerCase();
    let filtered = tasks.filter(t => {
        if (taskFilter !== 'all' && t.status !== taskFilter) return false;
        if (search && !t.name.toLowerCase().includes(search)) return false;
        return true;
    });

    // 排序：进行中 > 暂停 > 完成，同状态按更新时间倒序
    const statusOrder = { active: 0, paused: 1, done: 2 };
    filtered.sort((a, b) => {
        if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
        return b.updatedAt - a.updatedAt;
    });

    const container = document.getElementById('task-list');
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有任务，点击右上角创建一个吧~</div>';
    } else {
        container.innerHTML = filtered.map(t => {
            const logCount = logs.filter(l => l.taskId === t.id).length;
            const statusText = { active: '进行中', paused: '已暂停', done: '已完成' };
            const statusBadge = { active: 'badge-active', paused: 'badge-paused', done: 'badge-done' };
            return `
                <div class="task-card status-${t.status}" onclick="openTaskLogs('${t.id}')">
                    <div style="display:flex;align-items:center;justify-content:space-between">
                        <div class="task-name">${esc(t.name)}</div>
                        <span class="badge ${statusBadge[t.status]}">${statusText[t.status]}</span>
                    </div>
                    ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
                    <div class="task-meta">
                        <span>📝 ${logCount} 条日志</span>
                        <span>🕐 ${formatDate(t.updatedAt)}</span>
                        ${t.reminder ? `<span>🔔 ${t.reminderTime || '20:00'}</span>` : ''}
                    </div>
                    <div class="task-actions" onclick="event.stopPropagation()">
                        ${t.status === 'active' ? `<button class="task-action-btn" onclick="pauseTask('${t.id}')">暂停</button>` : ''}
                        ${t.status === 'paused' ? `<button class="task-action-btn primary" onclick="resumeTask('${t.id}')">继续</button>` : ''}
                        ${t.status !== 'done' ? `<button class="task-action-btn primary" onclick="completeTask('${t.id}')">完成</button>` : ''}
                        ${t.status === 'done' ? `<button class="task-action-btn" onclick="reopenTask('${t.id}')">重新开启</button>` : ''}
                        <button class="task-action-btn" onclick="editTask('${t.id}')">编辑</button>
                        <button class="task-action-btn danger" onclick="confirmDeleteTask('${t.id}')">删除</button>
                    </div>
                </div>`;
        }).join('');
    }

    // 更新统计
    const active = tasks.filter(t => t.status === 'active').length;
    const paused = tasks.filter(t => t.status === 'paused').length;
    const done = tasks.filter(t => t.status === 'done').length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-paused').textContent = paused;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-logs').textContent = logs.length;
    document.getElementById('task-summary').textContent = `${active} 个进行中的任务`;
}

// ===== 渲染日志列表 =====
function renderLogs() {
    load();
    if (!currentTaskId) return;
    const task = tasks.find(t => t.id === currentTaskId);
    if (!task) { switchPage('tasks'); return; }

    document.getElementById('log-task-name').textContent = task.name;

    let taskLogs = logs.filter(l => l.taskId === currentTaskId);

    // 筛选
    if (logFilter === 'pinned') taskLogs = taskLogs.filter(l => l.pinned);
    else if (logFilter === 'today') taskLogs = taskLogs.filter(l => isToday(l.createdAt));
    else if (logFilter === 'week') taskLogs = taskLogs.filter(l => isThisWeek(l.createdAt));

    // 排序：置顶在前，然后按时间倒序
    taskLogs.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return b.createdAt - a.createdAt;
    });

    document.getElementById('log-summary').textContent = `${taskLogs.length} 条日志`;

    // 提醒检查
    const hasTodayLog = logs.some(l => l.taskId === currentTaskId && isToday(l.createdAt));
    const banner = document.getElementById('reminder-banner');
    if (task.reminder && task.status === 'active' && !hasTodayLog) {
        banner.classList.remove('hidden');
    } else {
        banner.classList.add('hidden');
    }

    const container = document.getElementById('log-list');
    if (taskLogs.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有日志，点击右上角开始写吧~</div>';
    } else {
        container.innerHTML = taskLogs.map(l => `
            <div class="log-card ${l.pinned ? 'pinned' : ''}">
                <div class="log-date">
                    ${formatDateTime(l.createdAt)}
                    ${l.pinned ? '<span class="tag-pinned">📌 置顶</span>' : ''}
                </div>
                <div class="log-content">${esc(l.content)}</div>
                <div class="log-actions">
                    <button class="log-action-btn ${l.pinned ? 'pin-active' : ''}" onclick="togglePin('${l.id}')">
                        ${l.pinned ? '取消置顶' : '📌 置顶'}
                    </button>
                    <button class="log-action-btn" onclick="editLog('${l.id}')">编辑</button>
                    <button class="log-action-btn danger" onclick="confirmDeleteLog('${l.id}')">删除</button>
                </div>
            </div>
        `).join('');
    }
}

// ===== 任务操作 =====
function openTaskForm() {
    editingTaskId = null;
    document.getElementById('task-form-title').textContent = '新建任务';
    document.getElementById('tf-name').value = '';
    document.getElementById('tf-desc').value = '';
    document.getElementById('tf-reminder').checked = true;
    document.getElementById('tf-time').value = '20:00';
    document.getElementById('btn-delete-task').classList.add('hidden');
    document.getElementById('page-task-form').classList.add('active');
}
function closeTaskForm() { document.getElementById('page-task-form').classList.remove('active'); }

function editTask(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editingTaskId = id;
    document.getElementById('task-form-title').textContent = '编辑任务';
    document.getElementById('tf-name').value = t.name;
    document.getElementById('tf-desc').value = t.desc || '';
    document.getElementById('tf-reminder').checked = !!t.reminder;
    document.getElementById('tf-time').value = t.reminderTime || '20:00';
    document.getElementById('btn-delete-task').classList.remove('hidden');
    document.getElementById('page-task-form').classList.add('active');
}

function saveTask() {
    const name = document.getElementById('tf-name').value.trim();
    if (!name) { showToast('请输入任务名称'); return; }
    const desc = document.getElementById('tf-desc').value.trim();
    const reminder = document.getElementById('tf-reminder').checked;
    const reminderTime = document.getElementById('tf-time').value;

    if (editingTaskId) {
        const t = tasks.find(x => x.id === editingTaskId);
        if (t) { t.name = name; t.desc = desc; t.reminder = reminder; t.reminderTime = reminderTime; t.updatedAt = Date.now(); }
    } else {
        tasks.push({ id: genId(), name, desc, status: 'active', reminder, reminderTime, createdAt: Date.now(), updatedAt: Date.now() });
    }
    save(); closeTaskForm(); renderTasks();
    showToast(editingTaskId ? '任务已更新' : '任务已创建');
}

function confirmDeleteTask(id) {
    const t = tasks.find(x => x.id === id);
    showModal('删除任务', `确定要删除任务「${t?.name}」及其所有日志吗？`, () => {
        tasks = tasks.filter(x => x.id !== id);
        logs = logs.filter(l => l.taskId !== id);
        save(); renderTasks(); showToast('任务已删除');
    }, true);
}
function deleteTask() {
    if (editingTaskId) { confirmDeleteTask(editingTaskId); closeTaskForm(); }
}

function pauseTask(id) { const t = tasks.find(x => x.id === id); if (t) { t.status = 'paused'; t.updatedAt = Date.now(); save(); renderTasks(); showToast('任务已暂停'); } }
function resumeTask(id) { const t = tasks.find(x => x.id === id); if (t) { t.status = 'active'; t.updatedAt = Date.now(); save(); renderTasks(); showToast('任务已继续'); } }
function completeTask(id) { const t = tasks.find(x => x.id === id); if (t) { t.status = 'done'; t.updatedAt = Date.now(); save(); renderTasks(); showToast('任务已完成 🎉'); } }
function reopenTask(id) { const t = tasks.find(x => x.id === id); if (t) { t.status = 'active'; t.updatedAt = Date.now(); save(); renderTasks(); showToast('任务已重新开启'); } }

// ===== 日志操作 =====
function openTaskLogs(taskId) {
    currentTaskId = taskId;
    logFilter = 'all';
    document.querySelectorAll('[data-logfilter]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-logfilter="all"]').classList.add('active');
    switchPage('logs');
}

function openLogForm() {
    if (!currentTaskId) { showToast('请先选择一个任务'); return; }
    editingLogId = null;
    document.getElementById('log-form-title').textContent = '写日志';
    document.getElementById('lf-content').value = '';
    document.getElementById('lf-pinned').checked = false;
    document.getElementById('btn-delete-log').classList.add('hidden');
    document.getElementById('page-log-form').classList.add('active');
}
function closeLogForm() { document.getElementById('page-log-form').classList.remove('active'); }

function editLog(id) {
    const l = logs.find(x => x.id === id);
    if (!l) return;
    editingLogId = id;
    document.getElementById('log-form-title').textContent = '编辑日志';
    document.getElementById('lf-content').value = l.content;
    document.getElementById('lf-pinned').checked = !!l.pinned;
    document.getElementById('btn-delete-log').classList.remove('hidden');
    document.getElementById('page-log-form').classList.add('active');
}

function saveLog() {
    const content = document.getElementById('lf-content').value.trim();
    if (!content) { showToast('请输入日志内容'); return; }
    const pinned = document.getElementById('lf-pinned').checked;

    if (editingLogId) {
        const l = logs.find(x => x.id === editingLogId);
        if (l) { l.content = content; l.pinned = pinned; l.updatedAt = Date.now(); }
    } else {
        logs.push({ id: genId(), taskId: currentTaskId, content, pinned, createdAt: Date.now(), updatedAt: Date.now() });
    }
    save(); closeLogForm(); renderLogs();
    showToast(editingLogId ? '日志已更新' : '日志已保存');
}

function togglePin(id) {
    const l = logs.find(x => x.id === id);
    if (l) { l.pinned = !l.pinned; l.updatedAt = Date.now(); save(); renderLogs(); showToast(l.pinned ? '已置顶 📌' : '已取消置顶'); }
}

function confirmDeleteLog(id) {
    showModal('删除日志', '确定要删除这条日志吗？', () => {
        logs = logs.filter(x => x.id !== id);
        save(); renderLogs(); showToast('日志已删除');
    }, true);
}
function deleteLog() {
    if (editingLogId) { confirmDeleteLog(editingLogId); closeLogForm(); }
}

// ===== 提醒系统 =====
function checkReminders() {
    load();
    const now = new Date();
    const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const todayStr = formatDate(Date.now());

    tasks.filter(t => t.status === 'active' && t.reminder && t.reminderTime === currentTime).forEach(t => {
        const hasTodayLog = logs.some(l => l.taskId === t.id && isToday(l.createdAt));
        if (!hasTodayLog && Notification.permission === 'granted') {
            new Notification('任务日志提醒', { body: `「${t.name}」今天还没有更新日志哦~`, icon: '📝' });
        }
    });
}

// 请求通知权限
if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
}
// 每分钟检查一次提醒
setInterval(checkReminders, 60000);

// ===== HTML转义 =====
function esc(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== 提醒时间联动 =====
document.getElementById('tf-reminder').addEventListener('change', function() {
    document.getElementById('tf-time-group').style.display = this.checked ? 'block' : 'none';
});

// ===== 初始化 =====
load();
renderTasks();
</script>

</html>
